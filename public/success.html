<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOVAR BIZNESINI</title>
    


    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            color: #0f172a;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            padding: 4rem 3rem;
            border-radius: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            max-width: 480px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .checkmark-wrapper {
            margin-bottom: 2.5rem;
            display: flex;
            justify-content: center;
        }
        .checkmark-circle {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 30px -10px rgba(34, 197, 94, 0.5);
            animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .checkmark {
            color: white;
            width: 50px;
            height: 50px;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 1rem;
            letter-spacing: -0.05em;
            background: linear-gradient(to bottom right, #0f172a, #334155);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #64748b;
            margin-bottom: 3.5rem;
            font-size: 1.125rem;
            font-weight: 500;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            text-decoration: none;
            padding: 1.25rem 2.5rem;
            border-radius: 1.5rem;
            font-weight: 700;
            font-size: 1.125rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.4);
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 20px 30px -10px rgba(37, 99, 235, 0.5);
        }
        .btn:active {
            transform: translateY(-1px);
        }
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
        .btn-telegram {
            background: linear-gradient(135deg, #229ED9 0%, #1281b3 100%) !important;
            box-shadow: 0 10px 25px -5px rgba(34, 158, 217, 0.4) !important;
            display: inline-flex !important;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }
        .btn-telegram:hover {
            box-shadow: 0 20px 30px -10px rgba(34, 158, 217, 0.5) !important;
        }
        .btn-telegram svg {
            width: 20px;
            height: 20px;
        }
    </style>
</head>
<body>


    <div class="container">
        <div class="checkmark-wrapper">
            <div class="checkmark-circle">
                <svg class="checkmark" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
            </div>
        </div>
        <h1>Xaridingiz uchun rahmat!</h1>
        <p>Sizning buyurtmangiz muvaffaqiyatli qabul qilindi. Tez orada siz bilan bog'lanamiz.</p>
        <a href="https://t.me/+xT1RMkz9o31mZmI8" class="btn btn-telegram">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M21 5L2 12.5L9 13.5M21 5L18.5 20L9 13.5M21 5L9 13.5M9 13.5V19L12 15.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Telegram kanalimizga o'tish
        </a>
    </div>
</body>
</html>
